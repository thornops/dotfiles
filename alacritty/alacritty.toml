# ==============================================================================
# CONFIGURATION DE LA POLICE (JetBrainsMono Nerd Font)
# ==============================================================================
[font]
# Taille de la police (ajuste selon tes préférences)
size = 13.0

[font.normal]
family = "JetBrainsMono Nerd Font Mono"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font Mono"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font Mono"
style = "Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font Mono"
style = "Bold Italic"

# ==============================================================================
# OPTIMISATIONS VISUELLES (Optionnel mais recommandé)
# ==============================================================================
[window]
# Ajoute une légère marge intérieure pour que le texte ne colle pas aux bords
padding = { x = 6, y = 6 }

# Optionnel : active la transparence (0.0 = transparent, 1.0 = opaque)
# opacity = 0.95

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"
